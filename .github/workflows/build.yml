name: Build & Release

# Triggers:
#   - Push a version tag (v1.2.3) → creates a real GitHub Release with download links
#   - Push to main → builds artifacts only (no release), useful to verify the build works
#   - Manual trigger from the GitHub Actions UI

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:
  # ── macOS (arm64 — Apple Silicon) ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Compile Fn dictation helper (universal binary)
        run: |
          if [ -f electron/native/fn-monitor.swift ]; then
            # Compile as a universal binary so it works on both Apple Silicon and Intel Macs
            swiftc -O -target arm64-apple-macos11 electron/native/fn-monitor.swift -o /tmp/fn-arm64
            swiftc -O -target x86_64-apple-macos10.14 electron/native/fn-monitor.swift -o /tmp/fn-x64
            lipo -create /tmp/fn-arm64 /tmp/fn-x64 -output electron/native/fn-monitor
            echo "Built universal fn-monitor:"
            lipo -info electron/native/fn-monitor
          fi

      - name: Package macOS app (unsigned — no signing secrets configured)
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowWrite-mac
          path: dist/FlowWrite-mac.dmg
          retention-days: 30

  # ── Windows x64 NSIS installer ────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Package Windows app
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowWrite-win
          path: dist/FlowWrite-win-setup.exe
          retention-days: 30

  # ── GitHub Release (only on version tags: v1.0.0, v1.2.3 …) ─────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FlowWrite-mac
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FlowWrite-win
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FlowWrite ${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | [FlowWrite-mac.dmg](https://github.com/${{ github.repository }}/releases/latest/download/FlowWrite-mac.dmg) |
            | Windows 64-bit | [FlowWrite-win-setup.exe](https://github.com/${{ github.repository }}/releases/latest/download/FlowWrite-win-setup.exe) |

            > **These URLs always point to the latest version.**

            ### macOS install
            1. Download and open `FlowWrite-mac.dmg`
            2. Drag FlowWrite to Applications
            3. **First launch:** right-click the app → Open (bypasses Gatekeeper for unsigned builds)

            ### Windows install
            1. Download and run `FlowWrite-win-setup.exe`
            2. Choose install directory, then launch from Start menu
          draft: false
          prerelease: false
          files: |
            release-assets/FlowWrite-mac.dmg
            release-assets/FlowWrite-win-setup.exe
          fail_on_unmatched_files: false
