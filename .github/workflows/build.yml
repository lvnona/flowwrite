name: Build & Release

# Triggers:
#   - Push a version tag (v1.2.3) → creates a real GitHub Release with download links
#   - Push to main → builds artifacts only (no release), useful to verify the build works
#   - Manual trigger from the GitHub Actions UI

on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:

jobs:
  # ── macOS (arm64 — Apple Silicon) ─────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Compile Fn dictation helper (universal binary)
        run: |
          if [ -f electron/native/fn-monitor.swift ]; then
            # Compile as a universal binary so it works on both Apple Silicon and Intel Macs
            swiftc -O -target arm64-apple-macos11 electron/native/fn-monitor.swift -o /tmp/fn-arm64
            swiftc -O -target x86_64-apple-macos10.14 electron/native/fn-monitor.swift -o /tmp/fn-x64
            lipo -create /tmp/fn-arm64 /tmp/fn-x64 -output electron/native/fn-monitor
            echo "Built universal fn-monitor:"
            lipo -info electron/native/fn-monitor
          fi

      - name: Prepare macOS code-signing (only if the cert secret is set)
        run: |
          if [ -n "${{ secrets.APPLE_CERT_P12 }}" ]; then
            echo "${{ secrets.APPLE_CERT_P12 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            echo "CSC_LINK=$RUNNER_TEMP/cert.p12" >> "$GITHUB_ENV"
            echo "CSC_KEY_PASSWORD=${{ secrets.APPLE_CERT_PASSWORD }}" >> "$GITHUB_ENV"
            echo "Developer ID cert loaded -> signed + notarized build."
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "No APPLE_CERT_P12 secret -> unsigned build (Gatekeeper warning will appear)."
          fi

      - name: Package macOS app — universal (signed + notarized when cert present)
        run: npx electron-builder --mac --universal --publish never
        env:
          # Read by build/notarize.cjs; empty values make notarization skip.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowWrite-mac
          # .dmg = manual download; .zip + latest-mac.yml + .blockmap = auto-update feed.
          path: |
            dist/FlowWrite-mac.dmg
            dist/FlowWrite-mac.zip
            dist/latest-mac.yml
            dist/*.blockmap
          retention-days: 30

  # ── Windows x64 NSIS installer ────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Package Windows app
        run: npx electron-builder --win --x64 --publish never

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlowWrite-win
          # .exe = installer/manual download; .zip = portable version (no install
          # needed, runs from any folder — useful for locked-down work PCs);
          # latest.yml + .blockmap = auto-update feed for the installer.
          path: |
            dist/FlowWrite-win-setup.exe
            dist/FlowWrite-win-portable.zip
            dist/latest.yml
            dist/*.blockmap
          retention-days: 30

  # ── GitHub Release (only on version tags: v1.0.0, v1.2.3 …) ─────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FlowWrite-mac
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FlowWrite-win
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "FlowWrite ${{ github.ref_name }}"
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | [FlowWrite-mac.dmg](https://github.com/${{ github.repository }}/releases/latest/download/FlowWrite-mac.dmg) |
            | Windows 64-bit (installer) | [FlowWrite-win-setup.exe](https://github.com/${{ github.repository }}/releases/latest/download/FlowWrite-win-setup.exe) |
            | Windows 64-bit (portable, no install) | [FlowWrite-win-portable.zip](https://github.com/${{ github.repository }}/releases/latest/download/FlowWrite-win-portable.zip) |

            > **These URLs always point to the latest version.**

            **🔄 Automatic updates:** once installed, FlowWrite updates itself in
            the background and installs the new version on the next restart — no
            need to re-download after this first install. (Auto-update applies to
            the installer version only; for the portable zip, just download a
            new copy when there's an update.)

            ### macOS install
            1. Download and open `FlowWrite-mac.dmg`
            2. Drag FlowWrite to Applications and launch it (signed & notarized — opens with no warning)

            ### Windows install (normal)
            1. Download and run `FlowWrite-win-setup.exe`
            2. Choose install directory, then launch from Start menu

            ### Windows portable (locked-down PCs / no admin rights)
            1. Download `FlowWrite-win-portable.zip`
            2. Extract anywhere (Desktop, USB stick, OneDrive — your choice)
            3. Open the extracted folder and double-click `FlowWrite.exe`
            4. No installation, no admin rights needed. To "uninstall" — just delete the folder.
          draft: false
          prerelease: false
          files: |
            release-assets/FlowWrite-mac.dmg
            release-assets/FlowWrite-mac.zip
            release-assets/FlowWrite-win-setup.exe
            release-assets/FlowWrite-win-portable.zip
            release-assets/latest-mac.yml
            release-assets/latest.yml
            release-assets/*.blockmap
          fail_on_unmatched_files: false
